name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: .env  # accesses SUPABASE_* + IP_HASH_SALT secrets scoped to this env
    steps:
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Install SSH key
        env:
          DEPLOY_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          echo "$DEPLOY_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Trigger remote deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}

      - name: Apply Supabase env vars to running container
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IP_HASH_SALT: ${{ secrets.IP_HASH_SALT }}
        run: |
          # Build env file with shell-safe printf (no expansion surprises)
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY"
            printf 'IP_HASH_SALT=%s\n' "$IP_HASH_SALT"
          } > /tmp/swiss.env

          # SCP to VPS — scp uses sftp subsystem, doesn't trigger user login shell
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              /tmp/swiss.env \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/.swissalytics.env

          # Recreate container with full env (preserves existing GOOGLE_PAGESPEED_API_KEY)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              bash -s <<'REMOTE'
          set -e
          chmod 600 ~/.swissalytics.env

          IMAGE=$(docker inspect swissalytics --format '{{.Config.Image}}')
          EXISTING_GOOGLE_KEY=$(docker inspect swissalytics --format '{{range .Config.Env}}{{println .}}{{end}}' | grep '^GOOGLE_PAGESPEED_API_KEY=' | cut -d= -f2- || true)

          docker stop swissalytics 2>/dev/null || true
          docker rm swissalytics 2>/dev/null || true

          docker run -d \
            --name swissalytics \
            --restart unless-stopped \
            -p 80:3000 \
            -e NODE_ENV=production \
            -e ALLOWED_ORIGIN=https://swissalytics.com \
            -e "GOOGLE_PAGESPEED_API_KEY=$EXISTING_GOOGLE_KEY" \
            --env-file ~/.swissalytics.env \
            "$IMAGE"

          # Quick liveness probe inside the host
          sleep 3
          docker ps --filter name=swissalytics --format '{{.Names}} {{.Status}}'
          REMOTE

      - name: Smoke test (Supabase wired)
        run: |
          sleep 5
          HEALTH=$(curl -s -w "\nHTTP %{http_code}" https://swissalytics.com/api/health)
          HTTP=$(echo "$HEALTH" | tail -n1 | awk '{print $2}')
          BODY=$(echo "$HEALTH" | sed '$d')
          echo "Body: $BODY"
          echo "Status: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::/api/health returned HTTP $HTTP — Supabase not properly wired"
            exit 1
          fi
          if ! echo "$BODY" | grep -q '"supabase":"up"'; then
            echo "::error::/api/health responded 200 but supabase != up"
            exit 1
          fi
          echo "Health check OK: Supabase up"
